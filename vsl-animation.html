<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AI Secrets Pro — VSL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0A0A18;overflow:hidden}
canvas{display:block;width:100vw;height:100vh;touch-action:none}
#ui{position:fixed;bottom:0;left:0;right:0;z-index:10}
#caption{
  background:rgba(0,0,0,0.85);
  color:#fff;
  font-family:Georgia,serif;
  font-size:clamp(14px,2.5vw,20px);
  text-align:center;
  padding:14px 24px;
  min-height:56px;
  display:flex;align-items:center;justify-content:center;
  line-height:1.5;
  border-top:2px solid #F5A623;
}
.gold{color:#F5A623;font-weight:700}
#progress{height:4px;background:#111;width:100%}
#progFill{height:100%;background:#F5A623;width:0%;transition:width 0.1s linear}
#sceneLabel{
  position:fixed;top:16px;left:20px;
  font-family:Arial,sans-serif;font-size:11px;
  letter-spacing:3px;color:#F5A623;
  text-transform:uppercase;opacity:0.7;z-index:10;
}
#skipBtn{
  position:fixed;top:16px;right:20px;
  font-family:Arial,sans-serif;font-size:11px;
  color:#444;letter-spacing:2px;
  cursor:pointer;z-index:10;
  background:rgba(0,0,0,0.5);
  padding:6px 12px;border-radius:4px;
  border:1px solid #333;
}
#skipBtn:active{color:#F5A623}
</style>
</head>
<body>
<div id="sceneLabel">Scene 1 / 8</div>
<div id="skipBtn">NEXT ▶</div>
<canvas id="c"></canvas>
<div id="ui">
  <div id="progress"><div id="progFill"></div></div>
  <div id="caption">Are you <span class="gold">sitting on a pile of money</span> without even knowing it?</div>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight-70;
}
resize();
window.addEventListener('resize',resize);

let t=0,scene=0,sceneT=0;
const SCENE_DUR=360;

const captions=[
  "Are you <span class='gold'>sitting on a pile of money</span> without even knowing it?",
  "Every day without AI is money <span class='gold'>flying right out of your hands.</span>",
  "You tried everything. Nothing worked. <span class='gold'>Here's the real reason why.</span>",
  "Then <span class='gold'>AI arrived</span> — and changed everything forever.",
  "Introducing <span class='gold'>AI Secrets Pro</span> — the underground playbook.",
  "Real people. Zero experience. <span class='gold'>Real money.</span>",
  "Everything for just <span class='gold'>$17.</span> One time. 60-day guarantee.",
  "Stop waiting. Go to <span class='gold'>aisecretspro.com</span> right now."
];

const labels=["The Setup","The Problem","The Struggle","The Breakthrough","The Solution","The Proof","The Offer","The CTA"];

function lerp(a,b,t){return a+(b-a)*t}
function easeOut(t){return t<1?1-Math.pow(1-t,3):1}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}

function stars(n,speed=1){
  ctx.fillStyle='#fff';
  for(let i=0;i<n;i++){
    const x=(Math.sin(i*137.5+t*0.001*speed)*0.5+0.5)*W;
    const y=(Math.cos(i*97.3+t*0.0007*speed)*0.5+0.5)*H;
    const s=Math.sin(i+t*0.04)*0.5+0.8;
    ctx.globalAlpha=s*0.35;
    ctx.fillRect(x,y,1.5,1.5);
  }
  ctx.globalAlpha=1;
}

function grid(op=0.3){
  ctx.strokeStyle=`rgba(26,26,46,${op})`;
  ctx.lineWidth=0.5;
  const gs=Math.floor(Math.min(W,H)/10);
  for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
}

function bill(x,y,rot,col,size=1){
  ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.scale(size,size);
  ctx.fillStyle=col||'#27AE60';
  ctx.beginPath();ctx.roundRect(-24,-12,48,24,3);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(-20,-8,40,16,2);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.font='bold 11px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('$',0,0);
  ctx.restore();
}

function guy(x,y,sc,mood){
  ctx.save();ctx.translate(x,y);ctx.scale(sc,sc);
  const p=easeOut(clamp(sceneT/40,0,1));
  ctx.globalAlpha=p;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath();ctx.ellipse(0,92,36,9,0,0,Math.PI*2);ctx.fill();

  // Legs
  ctx.fillStyle='#1A1A3A';
  ctx.fillRect(-20,72,18,28);ctx.fillRect(2,72,18,28);
  ctx.fillStyle='#111';
  ctx.fillRect(-20,94,18,8);ctx.fillRect(2,94,18,8);

  // Body
  ctx.fillStyle=mood==='happy'?'#2A3A5A':'#2A2A4A';
  ctx.beginPath();ctx.roundRect(-22,22,44,52,4);ctx.fill();

  // Collar
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.moveTo(-6,22);ctx.lineTo(6,22);ctx.lineTo(4,34);ctx.lineTo(0,30);ctx.lineTo(-4,34);ctx.closePath();ctx.fill();

  // Tie
  ctx.fillStyle='#F5A623';
  ctx.beginPath();ctx.moveTo(-4,28);ctx.lineTo(4,28);ctx.lineTo(6,56);ctx.lineTo(0,62);ctx.lineTo(-6,56);ctx.closePath();ctx.fill();

  // Arms
  if(mood==='slump'){
    ctx.fillStyle='#2A2A4A';
    ctx.beginPath();ctx.roundRect(-44,26,24,14,4);ctx.fill();
    ctx.beginPath();ctx.roundRect(20,26,24,14,4);ctx.fill();
    ctx.fillStyle='#FFCC99';
    ctx.beginPath();ctx.arc(-32,46,9,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(32,46,9,0,Math.PI*2);ctx.fill();
  } else if(mood==='cheer'){
    ctx.fillStyle='#2A3A5A';
    ctx.save();ctx.translate(-34,24);ctx.rotate(-0.6);ctx.beginPath();ctx.roundRect(-10,-6,24,14,4);ctx.fill();ctx.restore();
    ctx.save();ctx.translate(34,24);ctx.rotate(0.6);ctx.beginPath();ctx.roundRect(-14,-6,24,14,4);ctx.fill();ctx.restore();
    ctx.fillStyle='#FFCC99';
    ctx.beginPath();ctx.arc(-44,14,9,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(44,14,9,0,Math.PI*2);ctx.fill();
  } else {
    ctx.fillStyle='#2A2A4A';
    ctx.beginPath();ctx.roundRect(-46,24,26,14,4);ctx.fill();
    ctx.beginPath();ctx.roundRect(20,24,26,14,4);ctx.fill();
    ctx.fillStyle='#FFCC99';
    ctx.beginPath();ctx.arc(-34,24,9,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(34,24,9,0,Math.PI*2);ctx.fill();
  }

  // Neck
  ctx.fillStyle='#FFCC99';ctx.fillRect(-6,4,12,20);

  // Head
  ctx.fillStyle='#FFCC99';
  ctx.beginPath();ctx.ellipse(0,-10,22,26,0,0,Math.PI*2);ctx.fill();

  // Hair
  ctx.fillStyle='#3A2510';
  ctx.beginPath();ctx.ellipse(0,-22,22,14,0,Math.PI,0);ctx.fill();
  ctx.beginPath();ctx.ellipse(-18,-12,8,10,0.4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(18,-12,8,10,-0.4,0,Math.PI*2);ctx.fill();

  // Ears
  ctx.fillStyle='#FFAA88';
  ctx.beginPath();ctx.ellipse(-22,-10,5,7,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(22,-10,5,7,0,0,Math.PI*2);ctx.fill();

  // Eyes
  if(mood==='happy'||mood==='cheer'){
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.ellipse(-8,-12,5,5,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(8,-12,5,5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#2255AA';
    ctx.beginPath();ctx.arc(-8,-12,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(8,-12,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(-7,-13,1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(9,-13,1.5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#555';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(0,-4,7,0.1,Math.PI-0.1);ctx.stroke();
  } else if(mood==='slump'){
    ctx.fillStyle='#555';
    ctx.beginPath();ctx.arc(-8,-14,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(8,-14,4,0,Math.PI*2);ctx.fill();
    // Sad brows
    ctx.strokeStyle='#555';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(-14,-20);ctx.lineTo(-4,-18);ctx.stroke();
    ctx.beginPath();ctx.moveTo(14,-20);ctx.lineTo(4,-18);ctx.stroke();
    ctx.beginPath();ctx.arc(0,-1,6,Math.PI+0.3,-0.3);ctx.stroke();
  } else {
    ctx.fillStyle='#444';
    ctx.beginPath();ctx.arc(-8,-12,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(8,-12,4,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#555';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-5,-3);ctx.lineTo(5,-3);ctx.stroke();
  }

  ctx.restore();
}

function bubble(x,y,text,col){
  ctx.save();
  ctx.fillStyle=col||'rgba(245,166,35,0.12)';
  ctx.strokeStyle=col?col:'#F5A623';
  ctx.lineWidth=1.5;
  const tw=ctx.measureText(text).width+32;
  ctx.beginPath();ctx.roundRect(x-tw/2,y-22,tw,36,18);ctx.fill();ctx.stroke();
  ctx.fillStyle='rgba(245,166,35,0.12)';ctx.strokeStyle='#F5A623';
  ctx.beginPath();ctx.arc(x,y+20,7,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.arc(x+6,y+32,4,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle='#F5A623';
  ctx.font='bold 13px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(text,x,y-4);
  ctx.restore();
}

// SCENE 0: Guy at desk with money floating
function s0(){
  grid();stars(60);

  // Floating money
  const mpos=[
    {bx:W*0.1,by:H*0.2,r:0.3,c:'#27AE60'},
    {bx:W*0.82,by:H*0.18,r:-0.2,c:'#F5A623'},
    {bx:W*0.08,by:H*0.55,r:0.5,c:'#27AE60'},
    {bx:W*0.88,by:H*0.5,r:-0.4,c:'#F5A623'},
    {bx:W*0.2,by:H*0.08,r:0.1,c:'#27AE60'},
    {bx:W*0.75,by:H*0.1,r:-0.15,c:'#F5A623'},
    {bx:W*0.5,by:H*0.08,r:0.05,c:'#27AE60'},
  ];
  mpos.forEach((m,i)=>{
    const fl=Math.sin(t*0.04+i*1.1)*8;
    bill(m.bx,m.by+fl,m.r,m.c,1.2);
  });

  // Desk
  ctx.fillStyle='#1A1A2E';
  ctx.beginPath();ctx.roundRect(W/2-130,H*0.62,260,16,3);ctx.fill();
  ctx.fillRect(W/2-120,H*0.62+16,18,H*0.3);
  ctx.fillRect(W/2+102,H*0.62+16,18,H*0.3);

  // Laptop screen
  ctx.fillStyle='#0D0D20';ctx.strokeStyle='#2A2A4A';ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(W/2-70,H*0.35,140,90,6);ctx.fill();ctx.stroke();
  ctx.fillStyle='#F5A623';
  ctx.beginPath();ctx.roundRect(W/2-64,H*0.36+4,128,78,4);ctx.fill();
  // Screen content - graph
  ctx.fillStyle='#0A0A18';
  ctx.beginPath();ctx.roundRect(W/2-60,H*0.36+8,120,70,3);ctx.fill();
  const bars=[25,40,30,55,45,62,70];
  bars.forEach((bh,i)=>{
    ctx.fillStyle='#F5A623';
    ctx.fillRect(W/2-52+i*17,H*0.36+8+68-bh,12,bh);
  });
  // Laptop base
  ctx.fillStyle='#1A1A2E';
  ctx.beginPath();ctx.roundRect(W/2-80,H*0.62-4,160,10,3);ctx.fill();

  // Guy
  const gsc=Math.min(W,H)*0.0024;
  guy(W/2,H*0.62,gsc,'neutral');

  // Question marks
  const qs=[{x:W*0.18,y:H*0.42},{x:W*0.78,y:H*0.38},{x:W*0.5,y:H*0.16},{x:W*0.35,y:H*0.28},{x:W*0.65,y:H*0.25}];
  qs.forEach((q,i)=>{
    ctx.globalAlpha=0.4+Math.sin(t*0.06+i*1.3)*0.3;
    ctx.fillStyle='#F5A623';
    ctx.font=`bold ${20+i*4}px Georgia`;ctx.textAlign='center';
    ctx.fillText('?',q.x,q.y+Math.sin(t*0.05+i)*5);
  });
  ctx.globalAlpha=1;
}

// SCENE 1: Money flying away
function s1(){
  grid();stars(40);
  const pr=easeOut(clamp(sceneT/80,0,1));

  ctx.fillStyle='#1A1A2E';
  ctx.beginPath();ctx.roundRect(W/2-130,H*0.65,260,16,3);ctx.fill();
  ctx.fillRect(W/2-120,H*0.65+16,18,60);ctx.fillRect(W/2+102,H*0.65+16,18,60);

  const gsc=Math.min(W,H)*0.0024;
  guy(W/2,H*0.65,gsc,'slump');

  for(let i=0;i<10;i++){
    const ang=-Math.PI/2+((i-5)/5)*Math.PI*0.9;
    const dist=60+pr*(W*0.45)+Math.sin(t*0.04+i)*8;
    const bx=W/2+Math.cos(ang)*dist;
    const by=H*0.5+Math.sin(ang)*dist*0.4;
    ctx.globalAlpha=Math.max(0,1-pr*0.85);
    bill(bx,by,ang,i%2?'#27AE60':'#F5A623',1+pr*0.5);
  }
  ctx.globalAlpha=1;

  // Clock
  const cx=W*0.12,cy=H*0.22,cr=Math.min(W,H)*0.055;
  ctx.strokeStyle='#F5A623';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(cx,cy,cr,0,Math.PI*2);ctx.stroke();
  const ha=t*0.04,ma=t*0.5;
  ctx.lineWidth=2;ctx.strokeStyle='#F5A623';
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(ha)*cr*0.55,cy+Math.sin(ha)*cr*0.55);ctx.stroke();
  ctx.lineWidth=1.5;ctx.strokeStyle='#fff';
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(ma)*cr*0.75,cy+Math.sin(ma)*cr*0.75);ctx.stroke();
  ctx.fillStyle='#F5A623';ctx.font=`${Math.floor(cr*0.35)}px Arial`;ctx.textAlign='center';
  ctx.fillText('TIME',cx,cy+cr+14);
}

// SCENE 2: Failed attempts
function s2(){
  grid();stars(40);
  const gsc=Math.min(W,H)*0.0024;
  guy(W/2,H*0.72,gsc,'slump');

  const fails=['DROPSHIP','COURSE','FREELANCE','ADS','CRYPTO'];
  fails.forEach((f,i)=>{
    const p=easeOut(clamp((sceneT-i*25)/35,0,1));
    if(p<=0)return;
    const fx=W*(0.1+i*0.2);const fy=H*0.28;
    ctx.globalAlpha=p;
    // Card
    ctx.fillStyle='#0D0D20';ctx.strokeStyle='#FF4444';ctx.lineWidth=1.5;
    const cw=W*0.14,ch=H*0.22;
    ctx.beginPath();ctx.roundRect(fx-cw/2,fy-ch/2,cw,ch,6);ctx.fill();ctx.stroke();
    ctx.fillStyle='#FF4444';ctx.font=`bold ${Math.floor(W*0.016)}px Arial`;ctx.textAlign='center';
    ctx.fillText(f,fx,fy-ch*0.1);
    // X mark
    ctx.strokeStyle='#FF4444';ctx.lineWidth=3;
    const xs=cw*0.25;
    ctx.beginPath();ctx.moveTo(fx-xs,fy+ch*0.1);ctx.lineTo(fx+xs,fy+ch*0.35);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fx+xs,fy+ch*0.1);ctx.lineTo(fx-xs,fy+ch*0.35);ctx.stroke();
    ctx.globalAlpha=1;
  });
}

// SCENE 3: AI breakthrough
function s3(){
  grid(0.15);stars(100,2);
  const pr=easeOut(clamp(sceneT/70,0,1));

  // Glow
  ctx.fillStyle=`rgba(245,166,35,${pr*0.06})`;ctx.fillRect(0,0,W,H);

  // Big AI
  ctx.globalAlpha=pr;
  const fs=Math.floor(W*0.18);
  ctx.font=`900 ${fs}px Georgia`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#F5A623';
  ctx.fillText('AI',W/2,H*0.38);
  ctx.font=`bold ${Math.floor(W*0.03)}px Arial`;
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.fillText('ARTIFICIAL INTELLIGENCE',W/2,H*0.55);
  ctx.globalAlpha=1;

  // Lightning
  if(sceneT>40){
    [[W*0.15,W*0.42],[W*0.5,W*0.5],[W*0.85,W*0.58]].forEach(([bx,ex],i)=>{
      const lp=easeOut(clamp((sceneT-40-i*10)/30,0,1));
      ctx.globalAlpha=lp*0.7;
      ctx.strokeStyle='#F5A623';ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(bx,H*0.05);
      ctx.lineTo(bx-12,H*0.35);ctx.lineTo(bx+8,H*0.35);
      ctx.lineTo(bx-10,H*0.75);
      ctx.stroke();ctx.globalAlpha=1;
    });
  }

  // Happy guy
  if(sceneT>80){
    const p=easeOut(clamp((sceneT-80)/50,0,1));
    ctx.globalAlpha=p;
    const gsc=Math.min(W,H)*0.0022;
    guy(W/2,H*0.88,gsc,'cheer');
    ctx.globalAlpha=1;
  }
}

// SCENE 4: Product reveal
function s4(){
  grid();stars(60);
  const pr=easeOut(clamp(sceneT/50,0,1));

  // Book
  ctx.save();ctx.translate(W*0.32,H*0.48);ctx.scale(pr,pr);
  const bw=Math.min(W*0.22,160),bh=Math.min(H*0.52,200);

  // Shadow
  ctx.fillStyle='rgba(245,166,35,0.08)';
  ctx.beginPath();ctx.ellipse(8,bh/2+10,bw*0.4,12,0,0,Math.PI*2);ctx.fill();

  // Book body
  ctx.fillStyle='#0A0A18';ctx.strokeStyle='#F5A623';ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(-bw/2,-bh/2,bw,bh,6);ctx.fill();ctx.stroke();

  // Spine
  ctx.fillStyle='#F5A623';
  ctx.fillRect(-bw/2,-bh/2,bw*0.08,bh);

  // Inner border
  ctx.strokeStyle='rgba(245,166,35,0.3)';ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(-bw/2+bw*0.12,-bh/2+10,bw*0.84,bh-20,4);ctx.stroke();

  const sz=bw*0.13;
  ctx.fillStyle='#F5A623';ctx.font=`900 ${sz*2}px Georgia`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('AI',-bw*0.1,-bh*0.28);
  ctx.fillStyle='#fff';ctx.font=`bold ${sz}px Arial`;
  ctx.fillText('SECRETS',-bw*0.1,-bh*0.06);
  ctx.fillStyle='#F5A623';
  ctx.fillRect(-bw*0.3,-bh*0.02,bw*0.4,2);
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font=`${sz*0.8}px Arial`;
  ctx.fillText('PRO',-bw*0.1,bh*0.1);
  ctx.fillStyle='#F5A623';ctx.font=`${sz*0.7}px Arial`;
  ctx.fillText('★★★★★',-bw*0.1,bh*0.25);
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font=`${sz*0.6}px Arial`;
  ctx.fillText('aisecretspro.com',-bw*0.1,bh*0.38);
  ctx.restore();

  // Features list
  if(sceneT>60){
    const feats=['⚡ 5 AI Money Tools','⚡ First Client in 24hrs','⚡ AI Email System','⚡ Affiliate Method','⚡ 30-Day Action Plan'];
    feats.forEach((f,i)=>{
      const p=easeOut(clamp((sceneT-60-i*20)/30,0,1));
      if(p<=0)return;
      ctx.globalAlpha=p;
      ctx.fillStyle='#F5A623';
      ctx.font=`bold ${Math.floor(W*0.018)}px Arial`;ctx.textAlign='left';
      ctx.fillText(f,W*0.56,H*0.22+i*H*0.12);
      ctx.globalAlpha=1;
    });
  }
}

// SCENE 5: Testimonials
function s5(){
  grid();stars(50);
  const cards=[
    {n:'Marcus T.',l:'Texas 🇺🇸',q:'+$200 in Week 2!',c:'#27AE60'},
    {n:'Sarah K.',l:'Florida 🇺🇸',q:'10K Followers!',c:'#F5A623'},
    {n:'James R.',l:'Ohio 🇺🇸',q:'$340 First Promo!',c:'#3498DB'},
  ];
  const cw=W*0.26,ch=H*0.48;

  cards.forEach((card,i)=>{
    const p=easeOut(clamp((sceneT-i*35)/45,0,1));
    if(p<=0)return;
    const cx=W*(0.17+i*0.33),cy=H*0.44;
    ctx.save();ctx.globalAlpha=p;ctx.translate(cx,cy);ctx.scale(p,p);

    ctx.fillStyle='#0D0D20';ctx.strokeStyle=card.c;ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(-cw/2,-ch/2,cw,ch,10);ctx.fill();ctx.stroke();

    // Avatar
    ctx.fillStyle=card.c;
    ctx.beginPath();ctx.arc(0,-ch*0.3,cw*0.18,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font=`bold ${Math.floor(cw*0.13)}px Arial`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(card.n[0],0,-ch*0.3);

    ctx.fillStyle='#fff';ctx.font=`bold ${Math.floor(cw*0.1)}px Arial`;
    ctx.fillText(card.n,0,-ch*0.1);
    ctx.fillStyle='#888';ctx.font=`${Math.floor(cw*0.085)}px Arial`;
    ctx.fillText(card.l,0,ch*0.02);
    ctx.fillStyle=card.c;ctx.font=`bold ${Math.floor(cw*0.1)}px Arial`;
    ctx.fillText(card.q,0,ch*0.16);
    ctx.fillStyle='#F5A623';ctx.font=`${Math.floor(cw*0.1)}px Arial`;
    ctx.fillText('★★★★★',0,ch*0.28);

    ctx.restore();
  });

  if(sceneT>120){
    const p=easeOut(clamp((sceneT-120)/50,0,1));
    ctx.globalAlpha=p;
    const gsc=Math.min(W,H)*0.002;
    guy(W/2,H*0.9,gsc,'cheer');
    ctx.globalAlpha=1;
  }
}

// SCENE 6: Price
function s6(){
  grid();stars(40);
  const pr=easeOut(clamp(sceneT/50,0,1));
  ctx.globalAlpha=pr;

  // Old price strikethrough
  ctx.fillStyle='#555';
  ctx.font=`bold ${Math.floor(W*0.045)}px Georgia`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('$97',W/2,H*0.22);
  if(sceneT>25){
    ctx.strokeStyle='#FF4444';ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(W/2-W*0.05,H*0.22);ctx.lineTo(W/2+W*0.05,H*0.22);ctx.stroke();
  }

  // New price
  if(sceneT>35){
    const p2=easeOut(clamp((sceneT-35)/40,0,1));
    ctx.globalAlpha=p2;
    ctx.fillStyle='#F5A623';
    ctx.font=`900 ${Math.floor(W*0.14)}px Georgia`;
    ctx.fillText('$17',W/2,H*0.5);
    ctx.fillStyle='#fff';ctx.font=`${Math.floor(W*0.022)}px Arial`;
    ctx.fillText('One-time payment. Instant access.',W/2,H*0.65);
    ctx.fillStyle='#888';ctx.font=`${Math.floor(W*0.018)}px Arial`;
    ctx.fillText('60-Day Money Back Guarantee',W/2,H*0.72);
  }

  // VS comparison
  if(sceneT>80){
    const p3=easeOut(clamp((sceneT-80)/40,0,1));
    ctx.globalAlpha=p3;
    const bw=W*0.3,bh=H*0.14;
    // Left
    ctx.fillStyle='#0D0D20';ctx.strokeStyle='#444';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(W*0.08,H*0.78,bw,bh,8);ctx.fill();ctx.stroke();
    ctx.fillStyle='#888';ctx.font=`${Math.floor(W*0.016)}px Arial`;ctx.textAlign='center';
    ctx.fillText('☕ Starbucks',W*0.08+bw/2,H*0.78+bh*0.4);
    ctx.fillStyle='#FF6666';ctx.font=`bold ${Math.floor(W*0.025)}px Arial`;
    ctx.fillText('$6',W*0.08+bw/2,H*0.78+bh*0.78);
    // Right
    ctx.fillStyle='#0D0D20';ctx.strokeStyle='#F5A623';ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(W*0.62,H*0.78,bw,bh,8);ctx.fill();ctx.stroke();
    ctx.fillStyle='#888';ctx.font=`${Math.floor(W*0.016)}px Arial`;
    ctx.fillText('🤖 AI Secrets Pro',W*0.62+bw/2,H*0.78+bh*0.4);
    ctx.fillStyle='#F5A623';ctx.font=`bold ${Math.floor(W*0.025)}px Arial`;
    ctx.fillText('$17',W*0.62+bw/2,H*0.78+bh*0.78);
    // VS
    ctx.fillStyle='#fff';ctx.font=`bold ${Math.floor(W*0.03)}px Arial`;
    ctx.fillText('VS',W/2,H*0.84);
  }

  ctx.globalAlpha=1;
}

// SCENE 7: CTA
function s7(){
  grid(0.15);stars(80,1.5);
  const pr=easeOut(clamp(sceneT/50,0,1));

  // Money rain
  for(let i=0;i<14;i++){
    const mx=(i/14)*W;
    const my=((t*2+i*35)%(H*0.85))+H*0.05;
    bill(mx,my,0.2+Math.sin(i)*0.3,i%3===0?'#27AE60':i%3===1?'#F5A623':'#3498DB',0.9);
  }

  // Happy guy
  const gsc=Math.min(W,H)*0.0026;
  guy(W/2,H*0.74,gsc,'cheer');

  // Think bubble
  if(sceneT>40){
    bubble(W/2+W*0.12,H*0.44,'$$$');
  }

  // URL box
  ctx.globalAlpha=pr;
  const bw=Math.min(W*0.7,480),bh=Math.min(H*0.18,80);
  const pulse=Math.sin(t*0.08)*3;
  ctx.fillStyle='#0D0D20';ctx.strokeStyle='#F5A623';ctx.lineWidth=2+Math.sin(t*0.08);
  ctx.beginPath();ctx.roundRect(W/2-bw/2,H*0.14-bh/2+pulse,bw,bh,12);ctx.fill();ctx.stroke();
  ctx.fillStyle='#F5A623';
  ctx.font=`bold ${Math.floor(W*0.042)}px Georgia`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('aisecretspro.com',W/2,H*0.14+pulse);
  ctx.fillStyle='#888';ctx.font=`${Math.floor(W*0.018)}px Arial`;
  ctx.fillText('Get instant access for $17',W/2,H*0.14+bh*0.35+pulse);
  ctx.globalAlpha=1;
}

const scenes=[s0,s1,s2,s3,s4,s5,s6,s7];

function tick(){
  t++;sceneT++;
  if(sceneT>=SCENE_DUR){
    sceneT=0;scene=(scene+1)%scenes.length;
    document.getElementById('caption').innerHTML=captions[scene];
    document.getElementById('sceneLabel').textContent=`Scene ${scene+1} / ${scenes.length} — ${labels[scene]}`;
  }
  const totalT=scene*SCENE_DUR+sceneT;
  const totalFrames=scenes.length*SCENE_DUR;
  document.getElementById('progFill').style.width=(totalT/totalFrames*100)+'%';

  ctx.fillStyle='#0A0A18';ctx.fillRect(0,0,W,H);
  scenes[scene]();
  requestAnimationFrame(tick);
}

document.getElementById('skipBtn').onclick=()=>{sceneT=SCENE_DUR-1};
document.getElementById('caption').innerHTML=captions[0];
document.getElementById('sceneLabel').textContent=`Scene 1 / ${scenes.length} — ${labels[0]}`;
tick();
</script>
